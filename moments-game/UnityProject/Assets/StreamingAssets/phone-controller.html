<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Moments Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color: #00BFFF;
      --bg: #0A0A0F;
      --fg: #FFFFFF;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }

    /* Player color frame */
    #frame {
      position: fixed; inset: 0;
      border: 6px solid var(--color);
      pointer-events: none; z-index: 9990;
      transition: border-color 0.4s;
    }

    /* Connection dot */
    #dot {
      position: fixed; top: calc(var(--safe-top) + 12px); right: 18px;
      width: 9px; height: 9px; border-radius: 50%;
      background: #ff4444; z-index: 9999;
      transition: background 0.3s;
    }
    #dot.ok { background: #44ff88; }

    /* ── Screens ── */
    .screen {
      display: none; position: fixed; inset: 0;
      flex-direction: column; align-items: center; justify-content: center;
      padding: calc(var(--safe-top) + 20px) 28px calc(var(--safe-bottom) + 20px);
      gap: 18px;
    }
    .screen.on { display: flex; }

    /* JOIN */
    #s-join .logo {
      font-size: 52px; font-weight: 900; letter-spacing: -3px;
      color: var(--color);
    }
    #s-join .sub { font-size: 15px; opacity: 0.45; text-align: center; }
    #s-join input {
      background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 18px; color: #fff; font-size: 24px; font-weight: 700;
      padding: 18px 24px; width: 100%; max-width: 340px;
      text-align: center; outline: none;
      transition: border-color 0.2s;
    }
    #s-join input:focus { border-color: var(--color); }
    #s-join input::placeholder { opacity: 0.25; }

    .btn {
      background: var(--color); color: #000;
      font-size: 20px; font-weight: 900;
      padding: 18px 36px; border-radius: 50px; border: none;
      width: 100%; max-width: 340px; cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.85; transform: scale(0.96); }
    .btn.ghost {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
    }

    /* CHAR SELECT */
    #s-chars { gap: 0; padding: 0; }
    .char-top {
      padding: calc(var(--safe-top) + 16px) 24px 10px;
      width: 100%; display: flex; align-items: center; gap: 14px;
    }
    .ava {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--color); display: flex; align-items: center;
      justify-content: center; font-size: 22px; transition: background 0.3s;
    }
    .char-name-tag { font-size: 17px; font-weight: 700; }

    .carousel {
      flex: 1; display: flex; align-items: center;
      overflow-x: scroll; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      gap: 14px; padding: 12px 24px; width: 100%;
    }
    .carousel::-webkit-scrollbar { display: none; }

    .ccard {
      scroll-snap-align: center; flex: 0 0 190px; height: 265px;
      border-radius: 22px; background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 18px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .ccard.sel {
      border-color: var(--color);
      background: rgba(0,191,255,0.1);
      transform: scale(1.02);
    }
    .ccard.taken { opacity: 0.28; pointer-events: none; }
    .ccard em { font-size: 60px; font-style: normal; }
    .ccard strong { font-size: 20px; font-weight: 800; }
    .ccard span { font-size: 11px; opacity: 0.45; text-align: center; line-height: 1.4; }
    .ccard .taken-badge {
      background: rgba(255,40,40,0.7); color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 3px 9px; border-radius: 20px; letter-spacing: 1px;
    }
    .char-bot {
      padding: 12px 24px calc(var(--safe-bottom) + 24px);
      width: 100%; display: flex; flex-direction: column; gap: 10px;
    }
    #btn-lock.rdy { background: var(--color); color: #000; }
    #btn-lock:not(.rdy) { background: transparent; border: 2px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }

    /* READY */
    #s-ready { text-align: center; gap: 20px; }
    #s-ready .big { font-size: 88px; }
    #s-ready .hero-n { font-size: 30px; font-weight: 900; color: var(--color); }
    .pulse-ring {
      width: 110px; height: 110px; border-radius: 50%;
      background: var(--color);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; animation: pulse 1.6s infinite ease-in-out;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); } 50% { transform: scale(1.07); }
    }
    #s-ready .wait { font-size: 14px; opacity: 0.35; }

    /* CONTROLLER */
    #s-ctrl { padding: 0; background: var(--bg); }
    .hud {
      position: absolute; top: 0; left: 0; right: 0;
      height: calc(var(--safe-top) + 52px);
      padding-top: var(--safe-top);
      display: flex; align-items: center;
      justify-content: space-between;
      padding-left: 20px; padding-right: 20px;
      background: rgba(0,0,0,0.5);
    }
    .hud-ava { font-size: 22px; }
    .hud-n { font-size: 14px; font-weight: 700; }
    .hud-score { font-size: 22px; font-weight: 900; color: var(--color); }
    #ctrl-root { position: absolute; inset: 0; }

    /* Feedback toast */
    #toast {
      position: fixed; top: calc(var(--safe-top) + 60px); left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,0.8); color: var(--color);
      font-size: 18px; font-weight: 800;
      padding: 10px 24px; border-radius: 30px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9000; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Countdown overlay */
    #cdo {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; z-index: 9500;
    }
    #cdo.on { display: flex; }
    .cdn { font-size: 130px; font-weight: 900; color: var(--color); animation: pop 0.35s ease; }
    @keyframes pop { 0% { transform: scale(1.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .cdl { font-size: 18px; opacity: 0.4; letter-spacing: 4px; }

    /* Eliminated overlay */
    #elimo {
      display: none; position: fixed; inset: 0;
      background: rgba(170,0,0,0.75);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9400;
    }
    #elimo.on { display: flex; }
    .elimo-icon { font-size: 80px; }
    .elimo-t { font-size: 52px; font-weight: 900; }
    .elimo-s { font-size: 17px; opacity: 0.65; }

    /* ── Generic Joystick ── */
    .jzone {
      position: absolute;
      width: 175px; height: 175px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
    }
    .jknob {
      width: 70px; height: 70px; border-radius: 50%;
      background: var(--color); opacity: 0.82;
      pointer-events: none;
      transition: transform 0.04s;
    }

    /* ── Generic Action Button ── */
    .abtn {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 3px solid var(--color);
      color: var(--color);
      font-size: 22px; font-weight: 900;
      -webkit-tap-highlight-color: transparent;
    }
    .abtn.md { width: 90px; height: 90px; }
    .abtn.lg { width: 120px; height: 120px; font-size: 28px; }
    .abtn.p { background: var(--color); color: #000; transform: scale(0.91); }
  </style>
</head>
<body>

<div id="dot"></div>
<div id="frame"></div>
<div id="toast"></div>

<!-- Countdown overlay -->
<div id="cdo">
  <div class="cdn" id="cdnum">3</div>
  <div class="cdl">GET READY</div>
</div>

<!-- Eliminated overlay -->
<div id="elimo">
  <div class="elimo-icon">💀</div>
  <div class="elimo-t">OUT!</div>
  <div class="elimo-s">Watching from the couch...</div>
</div>

<!-- JOIN -->
<div class="screen on" id="s-join">
  <div class="logo">MOMENTS</div>
  <div class="sub">Scan · Join · Play</div>
  <input id="nick" type="text" placeholder="Your name..." maxlength="12"
    autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <button class="btn" id="btn-join">JOIN ROOM</button>
</div>

<!-- CHAR SELECT -->
<div class="screen" id="s-chars">
  <div class="char-top">
    <div class="ava" id="ava">?</div>
    <div class="char-name-tag" id="ctag">Player</div>
  </div>
  <div class="carousel" id="carousel"></div>
  <div class="char-bot">
    <button class="btn" id="btn-lock">SELECT A HERO</button>
  </div>
</div>

<!-- READY -->
<div class="screen" id="s-ready">
  <div class="big" id="r-emoji">🎮</div>
  <div class="hero-n" id="r-name">Byte</div>
  <div class="pulse-ring">✓</div>
  <div style="font-size:15px;opacity:.45">Locked in!</div>
  <div class="wait">Waiting for others…</div>
</div>

<!-- CONTROLLER -->
<div class="screen" id="s-ctrl">
  <div class="hud">
    <div class="hud-ava" id="h-ava">🎮</div>
    <div class="hud-n"    id="h-name">Player</div>
    <div class="hud-score" id="h-score">0</div>
  </div>
  <div id="ctrl-root"></div>
</div>

<script>
(() => {
'use strict';

// ── Hero data ─────────────────────────────────────────────────────────────
const HEROES = [
  { id:'byte',    name:'Byte',    emoji:'🎮', desc:'Fastest button-masher in the galaxy', color:'#00BFFF' },
  { id:'nova',    name:'Nova',    emoji:'🔭', desc:'Built her first gadget at age 5',     color:'#FFD700' },
  { id:'orbit',   name:'Orbit',   emoji:'🚀', desc:'Lost in space, winning everywhere',   color:'#00FFE0' },
  { id:'striker', name:'Striker', emoji:'⚽', desc:'Never met a goal he couldn\'t score', color:'#7FFF00' },
  { id:'sizzle',  name:'Sizzle',  emoji:'🍳', desc:'Turns every arena into a cook-off',   color:'#FF6B00' },
  { id:'shade',   name:'Shade',   emoji:'🥷', desc:'Appears from nowhere, wins from nowhere', color:'#C77DFF' },
  { id:'dusty',   name:'Dusty',   emoji:'🤠', desc:'Rides in like the Wild West',          color:'#D2691E' },
  { id:'pop',     name:'Pop',     emoji:'🛼', desc:'Always first to the party',             color:'#FF1493' },
];

// ── State ─────────────────────────────────────────────────────────────────
let ws = null, pid = null, nick = '', reconnTok = null;
let playerColor = '#00BFFF';
let selHero = null, lockHero = null;
let score = 0;
let takenSet = new Set();
let inputTick = null;
let lockPressTimer = null;

// Virtual joystick/button state — reset each frame
const inp = {
  moveX:0, moveY:0, aimX:0, aimY:0,
  tiltX:0, tiltY:0,
  actionPressed:false, action2Pressed:false,
  touchX:0, touchY:0,
};

// ── DOM refs ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const screens = {
  join:  $('s-join'),
  chars: $('s-chars'),
  ready: $('s-ready'),
  ctrl:  $('s-ctrl'),
};

const show = key => {
  Object.values(screens).forEach(s => s.classList.remove('on'));
  screens[key]?.classList.add('on');
};

// ── Color helpers ─────────────────────────────────────────────────────────
const setColor = hex => {
  playerColor = hex;
  document.documentElement.style.setProperty('--color', hex);
  $('ava').style.background = hex;
};

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimeout;
const toast = msg => {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 2200);
};

// ── Haptic ────────────────────────────────────────────────────────────────
const haptic = pat => {
  if (!navigator.vibrate) return;
  const map = {
    dash:[30], hit:[80], fire:[20], pickup:[40,20,40],
    shield_break:[60,20,60], strong_hit:[120],
    eliminated:[100,50,200], win:[50,30,50,30,200],
    game_start:[30,20,30,20,80], countdown:[30],
  };
  navigator.vibrate(map[pat] || [30]);
};

// ── WebSocket ─────────────────────────────────────────────────────────────
const wsUrl = () => {
  const host = window.location.hostname || '%%WS_HOST%%';
  return `ws://${host}:8765/join`;
};

const connect = () => {
  ws = new WebSocket(wsUrl());
  ws.onopen = () => {
    $('dot').classList.add('ok');
    const saved = localStorage.getItem('moments_token');
    if (saved && pid) {
      send({ type:'reconnect', token: saved });
    } else {
      send({ type:'join', nickname: nick, roomToken: '%%ROOM_TOKEN%%' });
    }
  };
  ws.onclose  = () => { $('dot').classList.remove('ok'); setTimeout(connect, 3000); };
  ws.onerror  = () => ws.close();
  ws.onmessage = e => { try { route(JSON.parse(e.data)); } catch(_){} };
};

const send = obj => {
  if (ws?.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(obj));
};

// ── Server message router ─────────────────────────────────────────────────
const route = msg => {
  switch (msg.type) {
    // ── join_accepted (TV gateway) ──
    case 'join_accepted':
    case 'reconnect_accepted': {
      pid = msg.playerId;
      reconnTok = msg.reconnectToken;
      localStorage.setItem('moments_token', reconnTok);
      if (msg.playerColor) setColor(msg.playerColor);
      $('ava').textContent = HEROES.find(h=>h.id===lockHero)?.emoji ?? '?';
      $('ctag').textContent = nick;
      buildCarousel();
      show('chars');
      haptic('dash');
      break;
    }

    // ── lobby state from server broadcast ──
    case 'player_joined':
      takenSet = new Set(msg.takenHeroes || takenSet);
      updateCards();
      break;

    case 'player_disconnected':
      takenSet.delete(msg.playerId);
      updateCards();
      break;

    // ── UI commands from ControllerGateway.SendUICommand ──
    case 'ui_command': {
      const { command, payload } = msg;
      switch (command) {
        case 'countdown':      showCountdown(parseInt(payload) || 3); break;
        case 'show_feedback':  toast(payload); break;
        case 'show_multiplier': toast(`×${payload}`); break;
        case 'show_hp':        toast(`❤️`.repeat(parseInt(payload))); break;
        case 'show_eliminated':
          $('elimo').classList.add('on');
          stopInput();
          haptic('eliminated');
          break;
        case 'show_score':     $('h-score').textContent = payload; break;
        case 'podium': {
          const [place, pmsg] = payload.split('|');
          show('ready');
          $('r-emoji').textContent = +place===1?'🏆':+place===2?'🥈':'🥉';
          $('r-name').textContent = `#${place}`;
          document.querySelector('#s-ready .wait').textContent = pmsg || 'Thanks for playing!';
          haptic('win');
          break;
        }
        case 'layout':         activateLayout(payload); break;
        case 'show_game':      activateLayout(payload); break;
      }
      break;
    }

    case 'haptic':
      haptic(msg.pattern);
      break;

    case 'state_snapshot': {
      score = msg.score || score;
      $('h-score').textContent = score;
      if (msg.sessionPhase === 'InGame' && !$('s-ctrl').classList.contains('on')) {
        activateLayout(msg.activeMiniGame || 'default');
      }
      break;
    }

    case 'join_rejected':
      toast(msg.reason || 'Could not join!');
      show('join');
      break;

    case 'pong': break;
  }
};

// ── Join button ───────────────────────────────────────────────────────────
$('btn-join').addEventListener('click', () => {
  nick = $('nick').value.trim() || `P${~~(Math.random()*99)}`;
  if (!nick) return;
  connect();
});
$('nick').addEventListener('keydown', e => { if(e.key==='Enter') $('btn-join').click(); });

// ── Character carousel ────────────────────────────────────────────────────
const buildCarousel = () => {
  const c = $('carousel'); c.innerHTML = '';
  HEROES.forEach(h => {
    const d = document.createElement('div');
    d.className = 'ccard';
    d.dataset.id = h.id;
    if (takenSet.has(h.id)) d.classList.add('taken');
    d.innerHTML = `<em>${h.emoji}</em><strong>${h.name}</strong><span>${h.desc}</span>`;
    d.addEventListener('click', () => selectHero(h));
    c.appendChild(d);
  });
};

const updateCards = () => {
  document.querySelectorAll('.ccard').forEach(card => {
    const id = card.dataset.id;
    card.classList.toggle('taken', takenSet.has(id) && id !== selHero);
    card.classList.toggle('sel',   id === selHero);
  });
};

const selectHero = h => {
  selHero = h.id;
  setColor(h.color);
  $('ava').textContent = h.emoji;
  updateCards();
  $('btn-lock').classList.add('rdy');
  $('btn-lock').textContent = 'HOLD TO LOCK IN';
  send({ type:'heroHover', heroId: h.id });
  haptic('dash');
};

// Hold to lock in
const btnLock = $('btn-lock');
const lockStart = e => {
  e.preventDefault();
  if (!selHero) return;
  lockPressTimer = setTimeout(() => {
    lockHero = selHero;
    send({ type:'heroLock',  heroId: lockHero });
    send({ type:'ready' });
    showReadyScreen();
    haptic('win');
  }, 600);
};
const lockCancel = () => clearTimeout(lockPressTimer);
btnLock.addEventListener('touchstart', lockStart, { passive: false });
btnLock.addEventListener('touchend',   lockCancel);
btnLock.addEventListener('touchcancel',lockCancel);

const showReadyScreen = () => {
  const h = HEROES.find(x => x.id === lockHero);
  if (h) { $('r-emoji').textContent = h.emoji; $('r-name').textContent = h.name; }
  show('ready');
};

// ── Countdown ─────────────────────────────────────────────────────────────
const showCountdown = from => {
  const ov = $('cdo'), num = $('cdnum');
  ov.classList.add('on');
  let n = from;
  const tick = () => {
    if (n <= 0) { ov.classList.remove('on'); return; }
    num.textContent = n;
    num.style.animation = 'none'; num.offsetHeight; num.style.animation = '';
    haptic('countdown');
    n--; setTimeout(tick, 1000);
  };
  tick();
};

// ── Controller layout activation ──────────────────────────────────────────
const activateLayout = layoutId => {
  $('elimo').classList.remove('on');
  $('h-ava').textContent  = HEROES.find(h=>h.id===lockHero)?.emoji ?? '🎮';
  $('h-name').textContent = nick;
  $('h-score').textContent = score;
  show('ctrl');

  stopInput();
  const root = $('ctrl-root'); root.innerHTML = '';

  const map = {
    'polar-push':   buildMoveAndDash,
    'color-clash':  buildMoveAndBomb,
    'tank-battle':  buildTankLayout,
    'wave-rider':   buildWaveLayout,
    'bumper-blitz': buildMoveAndBoost,
    'blink-shot':   buildAimAndBlink,
    'gravity-grab': buildGrabLayout,
    'default':      buildMoveAndDash,
  };
  (map[layoutId] || map['default'])(root);
  startInput();
};

// ── Layout builders ───────────────────────────────────────────────────────

/* Polar Push: left joystick + DASH button */
const buildMoveAndDash = root => {
  root.innerHTML = `
    <div class="jzone" id="jl" style="left:36px;bottom:80px;">
      <div class="jknob" id="jlk"></div>
    </div>
    <div class="abtn md" id="b1" style="right:52px;bottom:115px;">DASH</div>
  `;
  joystick('jl','jlk', 'move');
  button('b1', 'action');
};

/* Color Clash: joystick + BOMB button */
const buildMoveAndBomb = root => {
  root.innerHTML = `
    <div class="jzone" id="jl" style="left:36px;bottom:80px;">
      <div class="jknob" id="jlk"></div>
    </div>
    <div class="abtn lg" id="b1" style="right:40px;bottom:100px;">💣</div>
  `;
  joystick('jl','jlk', 'move');
  button('b1', 'action');
};

/* Tank Battle: dual-stick + FIRE */
const buildTankLayout = root => {
  root.innerHTML = `
    <div class="jzone" id="jl" style="left:36px;bottom:80px;">
      <div class="jknob" id="jlk"></div>
    </div>
    <div class="jzone" id="jr" style="right:36px;bottom:80px;">
      <div class="jknob" id="jrk"></div>
    </div>
    <div class="abtn md" id="b1" style="left:50%;bottom:285px;transform:translateX(-50%);">🔥</div>
  `;
  joystick('jl','jlk', 'move');
  joystick('jr','jrk', 'aim');
  button('b1', 'action');
};

/* Wave Rider: steer joystick + TRICK + tilt */
const buildWaveLayout = root => {
  root.innerHTML = `
    <div class="jzone" id="jl" style="left:50%;bottom:70px;transform:translateX(-50%);">
      <div class="jknob" id="jlk"></div>
    </div>
    <div class="abtn md" id="b1" style="right:42px;bottom:270px;">🤙</div>
    <div style="position:absolute;top:80px;left:50%;transform:translateX(-50%);
      font-size:13px;opacity:0.35;letter-spacing:2px;white-space:nowrap">TILT TO BALANCE</div>
  `;
  joystick('jl','jlk', 'move');
  button('b1', 'action');
  // Device tilt → tiltX
  if (typeof DeviceOrientationEvent !== 'undefined') {
    window.addEventListener('deviceorientation', e => {
      inp.tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 40));
      inp.tiltY = Math.max(-1, Math.min(1, (e.beta  || 0) / 40));
    });
  }
};

/* Bumper Blitz: joystick + BOOST */
const buildMoveAndBoost = root => {

// ── Joystick ──────────────────────────────────────────────────────────────
const joystick = (zoneId, knobId, axis) => {
  const zone = document.getElementById(zoneId);
  const knob = document.getElementById(knobId);
  if (!zone || !knob) return;
  const MAX = 50;
  let tid = null, cx = 0, cy = 0;

  inp[axis + 'X'] = 0;
  inp[axis + 'Y'] = 0;

  zone.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = zone.getBoundingClientRect();
    cx = r.left + r.width  / 2;
    cy = r.top  + r.height / 2;
    tid = e.changedTouches[0].identifier;
  }, { passive: false });

  zone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== tid) continue;
      let dx = t.clientX - cx, dy = t.clientY - cy;
      const d = Math.hypot(dx, dy);
      if (d > MAX) { dx *= MAX/d; dy *= MAX/d; }
      knob.style.transform = `translate(${dx}px,${dy}px)`;
      inp[axis + 'X'] =  dx / MAX;
      inp[axis + 'Y'] = -dy / MAX;   // invert Y for Unity
    }
  }, { passive: false });

  const up = () => {
    knob.style.transform = '';
    inp[axis + 'X'] = 0;
    inp[axis + 'Y'] = 0;
    tid = null;
  };
  zone.addEventListener('touchend',    up);
  zone.addEventListener('touchcancel', up);
};

// ── Button ────────────────────────────────────────────────────────────────
const button = (btnId, field) => {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  inp[field + 'Pressed'] = false;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    inp[field + 'Pressed'] = true;
    btn.classList.add('p');
    haptic('dash');
  }, { passive: false });
  const up = () => { inp[field + 'Pressed'] = false; btn.classList.remove('p'); };
  btn.addEventListener('touchend',    up);
  btn.addEventListener('touchcancel', up);
};

// ── Aim pad ───────────────────────────────────────────────────────────────
const aimPad = padId => {
  const pad = document.getElementById(padId);
  if (!pad) return;
  pad.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = pad.getBoundingClientRect();
    const t = e.touches[0];
    inp.touchX = ((t.clientX - r.left) / r.width)  * 2 - 1;
    inp.touchY = ((t.clientY - r.top)  / r.height) * 2 - 1;
  }, { passive: false });
  pad.addEventListener('touchend', () => { inp.touchX = 0; inp.touchY = 0; });
};

// ── Input loop ────────────────────────────────────────────────────────────
// Sends at 20fps (50ms). One-shot action flags reset after send.
const startInput = () => {
  stopInput();
  inputTick = setInterval(() => {
    send({
      type:           'input',
      moveX:          parseFloat(inp.moveX.toFixed(3)),
      moveY:          parseFloat(inp.moveY.toFixed(3)),
      aimX:           parseFloat(inp.aimX.toFixed(3)),
      aimY:           parseFloat(inp.aimY.toFixed(3)),
      touchX:         parseFloat(inp.touchX.toFixed(3)),
      touchY:         parseFloat(inp.touchY.toFixed(3)),
      tiltX:          parseFloat(inp.tiltX.toFixed(3)),
      tiltY:          parseFloat(inp.tiltY.toFixed(3)),
      actionPressed:  !!inp.actionPressed,
      action2Pressed: !!inp.action2Pressed,
    });
    // Reset one-shot buttons after send
    inp.actionPressed  = false;
    inp.action2Pressed = false;
  }, 50);
};

const stopInput = () => { clearInterval(inputTick); inputTick = null; };

// ── Preload ───────────────────────────────────────────────────────────────
// Request device orientation permission on iOS 13+
document.addEventListener('touchstart', async () => {
  if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
    try { await DeviceOrientationEvent.requestPermission(); } catch(_) {}
  }
}, { once: true });

})();
